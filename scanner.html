<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Control - Jaula UTVAM</title>
    <style>
        :root {
            --verde-utvam: #00392C;
            --vino-utvam: #691A32;
            --dorado-utvam: #B2915F;
        }
        body { font-family: Arial, sans-serif; text-align: center; background: var(--verde-utvam); color: white; padding: 20px; }
        .logo { max-width: 160px; width: 100%; height: auto; margin-bottom: 10px; }
        .titulo-icono { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .titulo-icono svg { width: 32px; height: 32px; color: var(--dorado-utvam); }
        #reader { width: 100%; max-width: 500px; margin: 20px auto; background: black; border-radius: 8px; }
        .status-box { padding: 15px; margin: 20px auto; max-width: 400px; border-radius: 8px; font-size: 1.2rem; font-weight: bold; white-space: pre-line; }
        .espera { background: #64748b; }
        .exito { background: var(--verde-utvam); border: 2px solid #16a34a; }
        .error { background: var(--vino-utvam); }
        .bloqueado { background: var(--dorado-utvam); color: #1e293b; }
        #login-sec { max-width: 320px; margin: 60px auto; background: rgba(255,255,255,0.08); padding: 24px; border-radius: 10px; }
        #login-sec input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: none; box-sizing: border-box; }
        #login-sec button { width: 100%; padding: 10px; background: var(--dorado-utvam); color: #1e293b; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; }
        #loginError { color: #fca5a5; font-size: 0.85rem; min-height: 1.2em; }
    </style>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <img src="img/UtvamLogo.webp" alt="Logo UTVAM" class="logo">

    <!-- Pantalla de login: visible hasta que el operador inicie sesión -->
    <div id="login-sec">
        <h2>Acceso de operador</h2>
        <input type="email" id="loginEmail" placeholder="Correo">
        <input type="password" id="loginPassword" placeholder="Contraseña">
        <button id="btnLogin">Entrar</button>
        <p id="loginError"></p>
    </div>

    <!-- Pantalla del escáner: oculta hasta confirmar sesión de operador -->
    <div id="scanner-sec" style="display:none;">
        <h1 class="titulo-icono">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 8V6a2 2 0 0 1 2-2h2l1.5-2h5L16 4h2a2 2 0 0 1 2 2v2" stroke-linecap="round" stroke-linejoin="round"/>
                <rect x="2" y="8" width="20" height="12" rx="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="14" r="3.5"/>
            </svg>
            Escáner de Validación (Jaula)
        </h1>
        <p><small>Los Héroes Tizayuca</small></p>
        <div id="reader"></div>
        <div id="status" class="status-box espera">Esperando código QR...</div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, runTransaction, set, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAT0PJIWeph_0wu63V-mDjnnj1J9B7lJcM",
        authDomain: "balones-1834b.firebaseapp.com",
        databaseURL: "https://balones-1834b-default-rtdb.firebaseio.com",
        projectId: "balones-1834b",
        storageBucket: "balones-1834b.firebasestorage.app",
        messagingSenderId: "396891894851",
        appId: "1:396891894851:web:572ef0392fedd1610510f6",
        measurementId: "G-W3JQE8GBXZ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const statusBox = document.getElementById('status');

    // --- Login del operador ---
    // Nota: esta sesión queda guardada en el navegador (persistencia local por
    // defecto de Firebase), así que en el dispositivo fijo de la jaula solo
    // hay que iniciar sesión UNA vez.
    const loginSec = document.getElementById('login-sec');
    const scannerSec = document.getElementById('scanner-sec');
    const loginError = document.getElementById('loginError');
    let scannerIniciado = false;

    document.getElementById('btnLogin').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        loginError.textContent = '';
        try {
            await signInWithEmailAndPassword(auth, email, password);
        } catch (err) {
            loginError.textContent = 'Correo o contraseña incorrectos.';
            console.error(err);
        }
    });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            loginSec.style.display = 'none';
            scannerSec.style.display = 'block';
            if (!scannerIniciado) {
                scannerIniciado = true;
                const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
                html5QrcodeScanner.render(procesarEscaneo);
            }
        } else {
            loginSec.style.display = 'block';
            scannerSec.style.display = 'none';
        }
    });

    // --- Lógica de escaneo (sin cambios de fondo respecto a la versión anterior) ---
    const ULTIMO_ESCANEO = new Map();
    const COOLDOWN_POR_QR_MS = 2 * 60 * 1000;
    let bloqueoInstantaneo = 0;
    const DEBOUNCE_MS = 1500;

    function procesarEscaneo(idCodigoQR) {
        const ahora = Date.now();

        if (ahora < bloqueoInstantaneo) return;
        bloqueoInstantaneo = ahora + DEBOUNCE_MS;

        const ultimaVez = ULTIMO_ESCANEO.get(idCodigoQR);
        if (ultimaVez && (ahora - ultimaVez) < COOLDOWN_POR_QR_MS) {
            const segundosRestantes = Math.ceil((COOLDOWN_POR_QR_MS - (ahora - ultimaVez)) / 1000);
            actualizarPantalla(`Este QR ya se leyó hace poco.\nEspera ${segundosRestantes}s antes de volver a intentar.`, "bloqueado");
            return;
        }
        ULTIMO_ESCANEO.set(idCodigoQR, ahora);

        const prestamoRef = ref(db, 'prestamos/' + idCodigoQR);
        let estadoAnterior = null;

        runTransaction(prestamoRef, (datos) => {
            if (datos === null) return datos;

            estadoAnterior = datos.estado;
            const timestampActual = new Date().toISOString();

            if (datos.estado === 0) {
                datos.estado = 1;
                datos.hora_prestamo = timestampActual;
            } else if (datos.estado === 1) {
                datos.estado = 2;
                datos.hora_devolucion = timestampActual;
            }

            return datos;
        }).then((resultado) => {
            if (!resultado.committed || resultado.snapshot.val() === null) {
                actualizarPantalla("Código QR no válido o inexistente", "error");
                return;
            }

            const datos = resultado.snapshot.val();

            if (estadoAnterior === 0) {
                solicitarAperturaJaula();
                actualizarPantalla(`PRÉSTAMO AUTORIZADO\nAlumno: ${datos.nombre}`, "exito");
            } else if (estadoAnterior === 1) {
                solicitarAperturaJaula();
                actualizarPantalla(`DEVOLUCIÓN EXITOSA\nGracias, ${datos.nombre}`, "exito");
                remove(ref(db, 'matriculas_activas/' + datos.matricula))
                    .catch((err) => console.error('Error al liberar matrícula:', err));
                runTransaction(ref(db, 'control_inventario/balones_disponibles'), (disponibles) => (disponibles || 0) + 1)
                    .catch((err) => console.error('Error al regresar balón al inventario:', err));
            } else if (estadoAnterior === 2) {
                actualizarPantalla("ERROR: Este boleto ya completó su ciclo de devolución.", "error");
            }
        }).catch((err) => {
            console.error('Error en la transacción:', err);
            actualizarPantalla("Error de conexión o de permisos. Verifica tu sesión.", "error");
        });
    }

    function solicitarAperturaJaula() {
        set(ref(db, 'control_jaula/abrir_puerta'), true);
    }

    function actualizarPantalla(mensaje, tipo) {
        statusBox.innerText = mensaje;
        statusBox.className = "status-box " + tipo;
        setTimeout(() => {
            statusBox.innerText = "Esperando código QR...";
            statusBox.className = "status-box espera";
        }, tipo === "bloqueado" ? 3000 : 5000);
    }
</script>
</body>
</html>
