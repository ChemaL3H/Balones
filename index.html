<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Préstamo de Balones - UTVAM Los Héroes Tizayuca</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input, select, button { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: #2563eb; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #93c5fd; cursor: not-allowed; }
        #qr-container { margin-top: 20px; display: none; justify-content: center; flex-direction: column; align-items: center; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div id="form-sec">
        <h2>Universidad Tecnológica de la Zona Metropolitana del Valle de México</h2>
        <p><small>Los Héroes Tizayuca</small></p>
        <h3>Registro y Encuesta - Préstamo de Balones</h3>
        <form id="encuestaForm">
            <input type="text" id="nombre" placeholder="Nombre Completo" required>
            <input type="text" id="matricula" placeholder="Matrícula" required>
            <select id="carrera" required>
                <option value="">Seleccione una carrera</option>
                <option value="TIE">Tecnologías de la Información e Innovación Digital (TIE)</option>
                <option value="TID">Tecnologías de la Información y Desarrollo de Software (TID)</option>
                <option value="Mecatrónica">Mecatrónica</option>
                <option value="Lengua Inglesa">Lengua Inglesa</option>
                <option value="Negocios">Negocios</option>
            </select>

            <p><strong>Breve Encuesta:</strong></p>
            <label>¿En qué condiciones físicas consideras que está el material?</label>
            <select id="pregunta1" required>
                <option value="Excelente">Excelente</option>
                <option value="Bueno">Bueno / Regular</option>
                <option value="Malo">Malo / Desgastado</option>
            </select>

            <button type="submit">Generar mi pase QR</button>
        </form>
    </div>

    <div id="qr-container">
        <h3>¡Registro Exitoso!</h3>
        <p>Presenta este código QR en el lector de la jaula para retirar y devolver tu balón.</p>
        <div id="qrcode"></div>
        <p><small id="qr-id"></small></p>
    </div>
</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/encuesta.js"></script>
</body>
</html>
